<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offers - WorkEarn</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#030712;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
color:#00E5FF;
}

.search{
margin-bottom:20px;
}

.search input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:12px;
background:#111827;
color:white;
font-size:15px;
}

.offer{
background:#111827;
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.offer h3{
margin-bottom:6px;
}

.offer p{
color:#00ff99;
font-size:14px;
}

.offer button{
padding:10px 18px;
border:none;
border-radius:10px;
background:#00E5FF;
font-weight:600;
cursor:pointer;
}

.offer button:hover{
opacity:.9;
}

</style>

</head>

<body>

<h1>Refer and Earn</h1>

<div class="search">
<input type="text" id="search" placeholder="Search App..." onkeyup="searchApp()">
</div>

<div id="offers">

<div class="offer">
<div>
<h3>Angel One</h3>
<p>Earn ₹120/referral</p>
</div>
<button onclick="window.open('https://angel-one.onelink.me/Wjgr/r7e1l6lk')">Open</button>
</div>

<div class="offer">
<div>
<h3>Upstox</h3>
<p>Earn ₹100/referral</p>
</div>
<button onclick="window.open('https://upstox.onelink.me/0H1s/65ASFQ')">Open</button>
</div>

<div class="offer">
<div>
<h3>Hyuga Life</h3>
<p>Earn ₹40000Hcash </p>
</div>
<button onclick="window.open('https://hyugalife.onelink.me/3nEl/2dxljis4')">Open</button>
</div>

<div class="offer">
<div>
<h3>GroMo</h3>
<p>Earn 1100/referral</p>
</div>
<button onclick="window.open('https://app.gromo.co.in/BJzavp4UG4b')">Open</button>
</div>

<div class="offer">
<div>
<h3>Bank Sathi</h3>
<p>Earn 10% of your friend's income </p>
</div>
<button onclick="window.open('https://banksathi.u9ilnk.me/d/GB3kWGqJNN')">Open</button>
</div>

<div class="offer">
<div>
<h3>Funngro</h3>
<p>Earn 5% forever </p>
</div>
<button onclick="window.open('https://refer.funngro.com/refer/ALCTRZ')">Open</button>
</div>

<div class="offer">
<div>
<h3>Kotak 811</h3>
<p>Earn ₹250 every month</p>
</div>
<button onclick="window.open('https://jupiter.money')">Open</button>
</div>

<div class="offer">
<div>
<h3>Tide</h3>
<p>Earn up to ₹1600 every </br> month</p>
</div>
<button onclick="window.open('https://fi.money')">Open</button>
</div>

</div>

<script>

function searchApp(){

let input=document.getElementById("search").value.toUpperCase();

let offer=document.getElementsByClassName("offer");

for(let i=0;i<offer.length;i++){

let title=offer[i].getElementsByTagName("h3")[0];

if(title.innerHTML.toUpperCase().indexOf(input)>-1){

offer[i].style.display="flex";

}else{

offer[i].style.display="none";

}

}

}

</script>

</body>
</html>
